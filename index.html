<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineScope Review | Home</title>
  <link rel="icon" type="image/svg+xml" href="assets/cinescope-logo.svg">
  <script>
    /* Apply saved theme before CSS paints to avoid a visible flash. */
    (function () {
      try {
        var theme = localStorage.getItem('movieReviewTheme');
        if (theme) document.documentElement.dataset.theme = theme;
      } catch (error) {}
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css?v=english-posters">
</head>
<body data-page="home">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="CineScope Review Home">
      <span class="brand-mark">CS</span>
      <span class="brand-text">CineScope</span>
    </a>

    <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="main-nav" data-nav>
      <a href="index.html" data-page-link="home">Home</a>
      <a href="popular.html" data-page-link="popular">Popular Movies</a>
      <a href="action.html" data-page-link="action">Action Movies</a>
      <a href="drama.html" data-page-link="drama">Drama Movies</a>
      <a href="reviews.html" data-page-link="reviews">Reviews</a>
      <a href="contact.html" data-page-link="contact">Contact</a>
      <button class="mobile-theme-toggle" type="button" data-theme-toggle>
        <span data-theme-icon>Dark</span> mode
      </button>
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
      <span data-theme-icon>Dark</span>
    </button>
  </header>

  <main>
    <section class="hero-slider" aria-label="Featured movies">
      <div class="slider-stage" data-slider></div>
      <div class="slider-controls" aria-label="Slider controls">
        <button class="slider-arrow" type="button" data-slider-action="prev" aria-label="Previous movie">&#8249;</button>
        <div class="slider-dots" data-slider-dots aria-label="Featured movie navigation"></div>
        <button class="slider-arrow" type="button" data-slider-action="next" aria-label="Next movie">&#8250;</button>
      </div>
    </section>

    <section class="stats-band" aria-label="Movie stats">
      <div class="stats-strip" data-stats="home"></div>
    </section>

    <section class="section-shell">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Trending now</p>
          <h1>Popular movie reviews</h1>
        </div>
        <div class="heading-actions">
          <span class="result-count" data-results-count data-count-scope="home">Showing popular picks</span>
          <a class="text-link" href="popular.html">Explore all</a>
        </div>
      </div>
      <div class="movie-grid" data-render="home-popular"></div>
    </section>

    <section class="section-shell favorites-shell">
      <div class="section-heading compact-heading">
        <div>
          <p class="eyebrow">Saved locally</p>
          <h2>Your favorites</h2>
        </div>
      </div>
      <div class="favorite-list" data-favorite-list></div>
      <p class="empty-state" data-favorites-empty>No favorite movies yet.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 CineScope Review. Built with HTML, CSS and JavaScript.</p>
  </footer>

  <script src="js/script.js?v=english-posters"></script>
</body>
</html>
