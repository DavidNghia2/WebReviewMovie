<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineScope Review | Reviews</title>
  <link rel="icon" type="image/svg+xml" href="assets/cinescope-logo.svg">
  <script>
    /* Apply saved theme before CSS paints to avoid a visible flash. */
    (function () {
      try {
        var theme = localStorage.getItem('movieReviewTheme');
        if (theme) document.documentElement.dataset.theme = theme;
      } catch (error) {}
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css?v=story-page">
</head>
<body data-page="reviews">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="CineScope Review Home">
      <span class="brand-mark">CS</span>
      <span class="brand-text">CineScope</span>
    </a>

    <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="main-nav" data-nav>
      <a href="index.html" data-page-link="home">Home</a>
      <a href="popular.html" data-page-link="popular">Popular Movies</a>
      <a href="action.html" data-page-link="action">Action Movies</a>
      <a href="drama.html" data-page-link="drama">Drama Movies</a>
      <a href="reviews.html" data-page-link="reviews">Reviews</a>
      <a href="contact.html" data-page-link="contact">Contact</a>
      <button class="mobile-theme-toggle" type="button" data-theme-toggle>
        <span data-theme-icon>Dark</span> mode
      </button>
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
      <span data-theme-icon>Dark</span>
    </button>
  </header>

  <main>
    <section class="page-hero reviews-hero">
      <div class="page-hero-inner">
        <p class="eyebrow">Community notes</p>
        <h1>Reviews</h1>
        <p>Read audience reactions and add your own take.</p>
      </div>
    </section>

    <section class="section-shell reviews-layout">
      <form class="form-panel" data-review-form>
        <h2>Write a review</h2>

        <label class="field">
          <span>Your name</span>
          <input type="text" data-review-name placeholder="Nguyen An" required>
        </label>

        <label class="field">
          <span>Movie</span>
          <select data-review-movie required></select>
        </label>

        <div class="field">
          <span>Rating</span>
          <div class="star-input" data-review-star-input aria-label="Review rating"></div>
        </div>

        <label class="field">
          <span>Review</span>
          <textarea data-review-text rows="6" placeholder="Share your opinion" required></textarea>
        </label>

        <button class="primary-btn" type="submit">Submit Review</button>
      </form>

      <div class="review-column">
        <div class="section-heading compact-heading">
          <div>
            <p class="eyebrow">Latest</p>
            <h2>Audience reviews</h2>
          </div>
        </div>
        <div class="stats-strip review-stats" data-stats="reviews"></div>
        <label class="field review-filter">
          <span>Filter by movie</span>
          <select data-review-filter>
            <option value="">All reviews</option>
          </select>
        </label>
        <div class="review-list" data-review-list></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 CineScope Review. User reviews are saved in LocalStorage.</p>
  </footer>

  <script src="js/script.js?v=story-page"></script>
</body>
</html>
