<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineScope Review | Action Movies</title>
  <link rel="icon" type="image/svg+xml" href="assets/cinescope-logo.svg">
  <script>
    /* Apply saved theme before CSS paints to avoid a visible flash. */
    (function () {
      try {
        var theme = localStorage.getItem('movieReviewTheme');
        if (theme) document.documentElement.dataset.theme = theme;
      } catch (error) {}
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css?v=story-page">
</head>
<body data-page="action">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="CineScope Review Home">
      <span class="brand-mark">CS</span>
      <span class="brand-text">CineScope</span>
    </a>

    <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="main-nav" data-nav>
      <a href="index.html" data-page-link="home">Home</a>
      <a href="popular.html" data-page-link="popular">Popular Movies</a>
      <a href="action.html" data-page-link="action">Action Movies</a>
      <a href="drama.html" data-page-link="drama">Drama Movies</a>
      <a href="reviews.html" data-page-link="reviews">Reviews</a>
      <a href="contact.html" data-page-link="contact">Contact</a>
      <button class="mobile-theme-toggle" type="button" data-theme-toggle>
        <span data-theme-icon>Dark</span> mode
      </button>
    </nav>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">
      <span data-theme-icon>Dark</span>
    </button>
  </header>

  <main>
    <section class="page-hero action-hero">
      <div class="page-hero-inner">
        <p class="eyebrow">High energy picks</p>
        <h1>Action Movies</h1>
        <p>Fast pacing, bold set pieces and sharp audience scores.</p>
      </div>
    </section>

    <section class="section-shell">
      <div class="toolbar genre-toolbar" data-movie-controls>
        <label class="field search-field">
          <span>Search</span>
          <input type="search" data-movie-search placeholder="Search action movies">
        </label>

        <label class="field select-field">
          <span>Sort</span>
          <select data-sort-select>
            <option value="popular">Most popular</option>
            <option value="rating">Highest critic rating</option>
            <option value="newest">Newest release</option>
            <option value="title">Title A-Z</option>
            <option value="user-rating">Your rating</option>
          </select>
        </label>

        <label class="toggle-field">
          <input type="checkbox" data-favorite-filter>
          <span>Favorites only</span>
        </label>

        <button class="secondary-btn clear-btn" type="button" data-clear-filters>Clear</button>
      </div>

      <div class="results-row">
        <p class="result-count" data-results-count>Showing action movies</p>
      </div>
      <div class="movie-grid" data-render="genre" data-genre="Action"></div>
      <p class="empty-state" data-empty-state hidden>No action movies match your search.</p>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 CineScope Review. Your ratings and favorites are saved locally.</p>
  </footer>

  <script src="js/script.js?v=story-page"></script>
</body>
</html>
